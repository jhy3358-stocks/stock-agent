name: Daily Stock Report

on:
  # GitHub는 매 정각(00분)에 스케줄 실행이 몰려 지연되기 쉽다고 안내하므로,
  # 정각을 살짝 비껴가게 설정해 지연 가능성을 줄인다.
  schedule:
    - cron: "7 23 * * *"   # UTC 23:07 = KST 08:07 (다음날) ~ 목표 08:00
    - cron: "7 8 * * *"    # UTC 08:07 = KST 17:07 ~ 목표 17:00
    - cron: "37 12 * * *"  # UTC 12:37 = KST 21:37 ~ 목표 21:30
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run report pipeline
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python -m src.main

      - name: Commit updated report page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "docs: update daily stock report"
          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected, rebasing onto latest main and retrying..."
            git fetch origin main
            git rebase origin/main -X ours
          done
          echo "Failed to push after retries"
          exit 1
